<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>포인트 안내</title>

<style>
body{
  margin:0;
  background:#111;
  color:white;
  font-family:Arial;
}

.wrap{
  max-width:420px;
  margin:auto;
  padding:20px;
}

.card{
  background:#1a1a1a;
  padding:18px;
  border-radius:14px;
  margin-bottom:14px;
}

h2{ margin-top:0; }

.point{
  font-size:22px;
  font-weight:bold;
  color:#ffd56b;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#ffd56b;
  font-weight:bold;
  cursor:pointer;
}

.row{
  display:flex;
  gap:10px;
  margin-top:12px;
}

button.secondary{
  background:#2a2a2a;
  color:white;
  font-weight:normal;
}

.small{
  font-size:12px;
  opacity:.75;
  margin-top:8px;
  line-height:1.4;
  word-break:break-word;
}
</style>
</head>

<body>

<div class="wrap">

  <div class="card">
    <h2>🎁 내 포인트</h2>
    <div id="userInfo">로그인 필요</div>
    <div id="pointBox" class="point">0점</div>

    <div id="metaLine" class="small"></div>

    <div class="row">
      <button id="btnCheckin">출석 체크 (+10)</button>
      <button id="btnUse" class="secondary">컨텐츠 이용 (+1)</button>
    </div>

    <div id="loginHint" class="small" style="display:none;">
      포인트 기능은 로그인 후 이용 가능합니다. 메인에서 로그인해주세요.
    </div>

    <div id="sysHint" class="small" style="display:none;"></div>
  </div>

  <div class="card">
    <h2>📜 앱테크 규칙</h2>
    <p>• 출석 체크: +10점</p>
    <p>• 컨텐츠 이용: +1점</p>
    <p>• 친구 초대: 양쪽 +100점</p>
    <br>
    <p>💰 1점 = 1원</p>
    <p>💳 5,000점부터 출금 가능</p>
  </div>

  <button onclick="location.href='/'">메인으로 돌아가기</button>

</div>

<!-- ✅ API URL은 config.js에서만 관리 -->
<script src="/js/config.js"></script>
<script src="/js/points.js"></script>

<script>
function setSysHint(msg){
  const el = document.getElementById("sysHint");
  if(!el) return;
  el.style.display = "block";
  el.textContent = msg;
}

async function renderPoint(){
  const phone = localStorage.getItem("phone");
  const name = localStorage.getItem("name") || "회원";

  const btnCheckin = document.getElementById("btnCheckin");
  const btnUse = document.getElementById("btnUse");

  // ✅ points.js가 정상 로드되었는지 체크
  const hasPointsFns = (typeof window.loadMyPoint === "function") &&
                       (typeof window.checkinPoint === "function") &&
                       (typeof window.givePoint === "function");

  if(!hasPointsFns){
    setSysHint("시스템 로딩이 아직 완료되지 않았거나(points.js 미로드), 네트워크 문제일 수 있어요. 새로고침 후 다시 시도해주세요.");
    if(btnCheckin) btnCheckin.disabled = true;
    if(btnUse) btnUse.disabled = true;
  }else{
    const hint = document.getElementById("sysHint");
    if(hint) hint.style.display = "none";
  }

  if(!phone){
    document.getElementById("userInfo").textContent = "로그인 필요";
    document.getElementById("pointBox").textContent = "0점";
    document.getElementById("metaLine").textContent = "로그인 후 포인트가 표시됩니다.";
    document.getElementById("loginHint").style.display = "block";

    if(btnCheckin) btnCheckin.disabled = true;
    if(btnUse) btnUse.disabled = true;
    return;
  }

  document.getElementById("loginHint").style.display = "none";
  document.getElementById("userInfo").textContent = `${name}님`;

  // ✅ 안전 호출
  let p = 0;
  try{
    p = await window.loadMyPoint();
  }catch(e){
    setSysHint("포인트 조회 중 오류가 발생했어요. 새로고침 후 다시 시도해주세요.");
    console.warn(e);
    p = Number(localStorage.getItem("point") || "0");
  }

  const num = Number(p);
  document.getElementById("pointBox").textContent =
    (Number.isFinite(num) ? num.toLocaleString() : "0") + "점";

  document.getElementById("metaLine").textContent =
    "전화번호: " + phone + " · (API: config.js)";

  // 로그인 상태면 버튼 활성
  if(btnCheckin) btnCheckin.disabled = false;
  if(btnUse) btnUse.disabled = false;
}

// 버튼 이벤트
document.getElementById("btnCheckin")?.addEventListener("click", async ()=>{
  if(typeof window.checkinPoint !== "function"){
    alert("시스템 로딩이 아직 끝나지 않았어요. 새로고침 후 다시 시도해주세요.");
    return;
  }
  await window.checkinPoint();
  await renderPoint();
});

document.getElementById("btnUse")?.addEventListener("click", async ()=>{
  if(typeof window.givePoint !== "function"){
    alert("시스템 로딩이 아직 끝나지 않았어요. 새로고침 후 다시 시도해주세요.");
    return;
  }
  await window.givePoint();
  await renderPoint();
});

// ✅ 실행 타이밍 안정화
document.addEventListener("DOMContentLoaded", ()=>{
  renderPoint();
});
</script>

<footer style="
margin-top:40px;
padding:20px 10px;
text-align:center;
font-size:12px;
opacity:0.7;
">

</div>

</footer>
</body>
</html>
