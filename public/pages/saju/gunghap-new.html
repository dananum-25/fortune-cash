<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex,nofollow">
  <title>정밀 궁합 분석 | 신규 엔진</title>
  <link rel="stylesheet" href="/css/common.css">
  <style>
    body{margin:0;background:#f7f7fb;color:#222;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
    .wrap{max-width:980px;margin:0 auto;padding:20px 16px 80px}
    .card{background:#fff;border-radius:16px;padding:18px;margin-bottom:16px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
    .field{display:flex;flex-direction:column;gap:6px;margin-bottom:10px}
    label{font-size:14px;font-weight:700}
    input,select,button{height:44px;border:1px solid #ddd;border-radius:10px;padding:0 12px;box-sizing:border-box}
    button{background:#111827;color:#fff;border:none;font-weight:700;cursor:pointer}
    .section-title{font-size:18px;font-weight:800;margin:0 0 12px}
    .muted{color:#666;font-size:14px}
    .hidden{display:none}
    .list{margin:0;padding-left:18px;line-height:1.7}
    .mini-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
    .item{background:#fafafa;border:1px solid #eee;border-radius:12px;padding:12px}
    @media (max-width:720px){.grid,.mini-grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="section-title">정밀 궁합 분석</div>
      <div class="muted">두 사람의 일간, 일지, 오행 흐름을 기반으로 궁합 구조를 확인합니다.</div>
    </div>

    <form id="gunghapForm" class="grid">
      <div class="card">
        <div class="section-title">첫 번째 사람</div>
        <div class="field">
          <label for="nameA">이름 (선택)</label>
          <input id="nameA" type="text" placeholder="홍길동">
        </div>
        <div class="field">
          <label for="birthDateA">생년월일</label>
          <input id="birthDateA" type="date" required>
        </div>
        <div class="field">
          <label for="genderA">성별</label>
          <select id="genderA" required>
            <option value="">선택</option>
            <option value="남성">남성</option>
            <option value="여성">여성</option>
          </select>
        </div>
        <div class="field">
          <label for="hourA">출생 시</label>
          <select id="hourA"></select>
        </div>
        <div class="field">
          <label for="minuteA">출생 분</label>
          <select id="minuteA"></select>
        </div>
      </div>

      <div class="card">
        <div class="section-title">두 번째 사람</div>
        <div class="field">
          <label for="nameB">이름 (선택)</label>
          <input id="nameB" type="text" placeholder="김철수">
        </div>
        <div class="field">
          <label for="birthDateB">생년월일</label>
          <input id="birthDateB" type="date" required>
        </div>
        <div class="field">
          <label for="genderB">성별</label>
          <select id="genderB" required>
            <option value="">선택</option>
            <option value="남성">남성</option>
            <option value="여성">여성</option>
          </select>
        </div>
        <div class="field">
          <label for="hourB">출생 시</label>
          <select id="hourB"></select>
        </div>
        <div class="field">
          <label for="minuteB">출생 분</label>
          <select id="minuteB"></select>
        </div>
      </div>

      <div class="card" style="grid-column:1 / -1;">
        <button type="submit">궁합 분석하기</button>
      </div>
    </form>

<div id="resultWrap" class="hidden">
  <div class="card">
    <div class="section-title" id="resultTitle">궁합 결과</div>
    <div class="muted" id="resultSummary"></div>
  </div>

  <div class="card">
    <div class="section-title">두 사람 사주 원국</div>
    <div class="mini-grid">
      <div class="item">
        <strong id="personATitle">첫 번째 사람</strong>
        <div id="personAPillars"></div>
      </div>
      <div class="item">
        <strong id="personBTitle">두 번째 사람</strong>
        <div id="personBPillars"></div>
      </div>
      <div class="item">
        <strong>일간 관계</strong>
        <div id="dayStemRel"></div>
      </div>
      <div class="item">
        <strong>일지 관계</strong>
        <div id="dayBranchRel"></div>
      </div>
      <div class="item">
        <strong>원국 간 지지 관계</strong>
        <div id="fiveRel"></div>
      </div>
      <div class="item">
        <strong>궁합 점수</strong>
        <div id="totalScore"></div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="section-title">지장간 / 신살 보조 해석</div>
    <div class="mini-grid">
      <div class="item">
        <strong>첫 번째 사람 월지 지장간 핵심</strong>
        <div id="aJijanganMain"></div>
      </div>
      <div class="item">
        <strong>두 번째 사람 월지 지장간 핵심</strong>
        <div id="bJijanganMain"></div>
      </div>
      <div class="item">
        <strong>공통 특수신살</strong>
        <div id="sharedExtraSinsal"></div>
      </div>
      <div class="item">
        <strong>첫 번째 사람 특수신살</strong>
        <div id="aExtraSinsal"></div>
      </div>
      <div class="item">
        <strong>두 번째 사람 특수신살</strong>
        <div id="bExtraSinsal"></div>
      </div>
      <div class="item">
        <strong>12신살 참고</strong>
        <div id="sinsalHint"></div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="section-title">조언</div>
    <ul class="list" id="adviceList"></ul>
  </div>
</div>

  <script type="module" src="/js/gunghap.page.js"></script>
</body>
</html>
