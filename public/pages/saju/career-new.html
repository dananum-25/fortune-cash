<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>정밀 직업 적성 분석 | 신규 엔진</title>
  <link rel="stylesheet" href="/css/common.css">
  <style>
    body{margin:0;background:#f7f7fb;color:#222;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
    .wrap{max-width:900px;margin:0 auto;padding:20px 16px 80px}
    .card{background:#fff;border-radius:16px;padding:18px;margin-bottom:16px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .field{display:flex;flex-direction:column;gap:6px}
    label{font-size:14px;font-weight:700}
    input,select,button{height:44px;border:1px solid #ddd;border-radius:10px;padding:0 12px;box-sizing:border-box}
    button{background:#111827;color:#fff;border:none;font-weight:700;cursor:pointer}
    .section-title{font-size:18px;font-weight:800;margin:0 0 12px}
    .muted{color:#666;font-size:14px}
    .hidden{display:none}
    .list{margin:0;padding-left:18px;line-height:1.7}
    .mini-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
    .item{background:#fafafa;border:1px solid #eee;border-radius:12px;padding:12px}
    @media (max-width:720px){.grid,.mini-grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="section-title">정밀 직업 적성 분석</div>
      <div class="muted">십성, 신강/신약, 오행 흐름을 바탕으로 직업 적성 방향을 확인합니다.</div>
    </div>

    <form id="careerForm" class="card grid">
      <div class="field">
        <label for="userName">이름 (선택)</label>
        <input id="userName" type="text" placeholder="홍길동">
      </div>

      <div class="field">
        <label for="birthDate">생년월일</label>
        <input id="birthDate" type="date" required>
      </div>

      <div class="field">
        <label for="gender">성별</label>
        <select id="gender" required>
          <option value="">선택</option>
          <option value="남성">남성</option>
          <option value="여성">여성</option>
        </select>
      </div>

      <div class="field">
        <label for="birthHour">출생 시</label>
        <select id="birthHour"></select>
      </div>

      <div class="field">
        <label for="birthMinute">출생 분</label>
        <select id="birthMinute"></select>
      </div>

      <div class="field" style="grid-column:1 / -1;">
        <button type="submit">직업 적성 분석하기</button>
      </div>
    </form>

    <div id="resultWrap" class="hidden">
      <div class="card">
        <div class="section-title" id="resultTitle">직업 적성 결과</div>
        <div class="muted" id="resultSummary"></div>
      </div>

      <div class="card">
        <div class="section-title">핵심 적성 구조</div>
        <div class="mini-grid">
          <div class="item">
            <strong>핵심 십성</strong>
            <div id="mainTenGod"></div>
          </div>
          <div class="item">
            <strong>적성 유형</strong>
            <div id="careerType"></div>
          </div>
          <div class="item">
            <strong>신강/신약</strong>
            <div id="strengthLabel"></div>
          </div>
          <div class="item">
            <strong>오행 힌트</strong>
            <div id="fiveElementHint"></div>
          </div>
        </div>
      </div>

<div class="card">
  <div class="section-title">현재 직업 흐름</div>
  <div class="mini-grid">
    <div class="item">
      <strong>현재 세운</strong>
      <div id="currentSeWoon"></div>
    </div>
    <div class="item">
      <strong>현재 대운</strong>
      <div id="currentDaewoon"></div>
    </div>
    <div class="item">
      <strong>세운 흐름</strong>
      <div id="sewoonFlowTitle"></div>
    </div>
    <div class="item">
      <strong>대운 흐름</strong>
      <div id="daewoonFlowTitle"></div>
    </div>
  </div>

  <strong style="display:block; margin-top:14px;">흐름 요약</strong>
  <ul class="list" id="careerFlowList"></ul>
</div>
      
      <div class="card">
        <div class="section-title">추천 직무</div>
        <ul class="list" id="jobList"></ul>
      </div>

      <div class="card">
        <div class="section-title">조언</div>
        <ul class="list" id="adviceList"></ul>
      </div>
    </div>
  </div>

  <script type="module" src="/js/career.page.js"></script>
</body>
</html>
