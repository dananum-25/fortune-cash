<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>포춘쿠키 | 오늘의 한 줄 운세</title>
  <meta name="description" content="오늘의 포춘쿠키 한 줄 운세. 로그인 시 포인트도 적립됩니다.">
  <link rel="canonical" href="https://fortune-cash.vercel.app/pages/cookie/cookie.html">

  <style>
    body{margin:0;background:#111;color:#fff;font-family:Arial;}
    .wrap{max-width:820px;margin:auto;padding:20px;}
    .card{background:#1a1a1a;border-radius:16px;padding:18px;margin:16px 0;}
    h1{font-size:26px;margin:0 0 10px;}
    h2{margin:18px 0 10px;}
    .small{font-size:12px;opacity:.8}
    button{width:100%;padding:14px;border:none;border-radius:12px;background:#ffd56b;font-weight:bold;margin-top:10px;cursor:pointer;}
    button.secondary{background:#2a2a2a;color:#fff;font-weight:normal;}
    a{color:#ffd56b;text-decoration:none;}
    .row{display:flex;gap:10px;}
    .row button{width:100%;}
    .hr{height:1px;background:#222;margin:14px 0;}

    /* ===== Fortune Cookie Pull UI ===== */
    .cookie-stage{
      display:flex; flex-direction:column; align-items:center;
      padding:10px 0;
    }

    .cookie-wrap{
      position:relative;
      width:min(520px, 92vw);
      height:320px;
      display:flex;
      justify-content:center;
      align-items:flex-end;
      user-select:none;
    }

    /* ===== 쿠키 좌우 분리 구조 ===== */
    .cookie-shell{
      width:260px;
      height:200px;
      position:relative;
      transform-origin:center bottom;
    }

    .cookie-half{
      position:absolute;
      width:130px;
      height:200px;
      background: linear-gradient(180deg, #f6d28b, #d19a43);
      box-shadow: 0 18px 40px rgba(0,0,0,.45);
      transition: transform .6s cubic-bezier(.2,.9,.2,1);
    }

    .cookie-half.left{
      left:0;
      border-radius:140px 0 0 90px;
      transform-origin:right center;
    }

    .cookie-half.right{
      right:0;
      border-radius:0 140px 90px 0;
      transform-origin:left center;
    }

    /* ===== 열릴 때 ===== */
    .cookie-open .left{
      transform: rotate(-35deg) translateX(-30px);
    }

    .cookie-open .right{
      transform: rotate(35deg) translateX(30px);
    }

    /* ===== 반짝임 ===== */
    .cookie-shine{
      position:absolute; top:24px; left:30px;
      width:80px; height:50px;
      border-radius: 50px;
      background: rgba(255,255,255,.18);
      filter: blur(0.2px);
      pointer-events:none;
    }

    /* ===== 종이 등장 ===== */
    .fortune-paper{
      position:absolute;
      bottom:120px;
      width: min(460px, 88vw);
      max-width:460px;
      background:#141414;
      border:1px solid #222;
      border-radius:16px;
      padding:16px 16px 14px;
      box-shadow: 0 10px 25px rgba(0,0,0,.35);

      transform: translateY(80px) scale(.85);
      opacity:0;
      pointer-events:none;
      transition: all .6s cubic-bezier(.2,.9,.2,1);
    }

    .fortune-paper.show{
      transform: translateY(0px) scale(1);
      opacity:1;
      pointer-events:auto;
    }

    .fortune-title{
      color:#ffd56b; font-weight:bold; margin-bottom:8px;
    }

    .fortune-msg{
      font-size:18px; line-height:1.8;
      opacity:0;
      transform: translateY(12px);
      transition: all .5s ease .3s;
      white-space:pre-wrap;
    }

    .fortune-msg.show{
      opacity:1;
      transform: translateY(0);
    }

    /* ===== 끈 + 태그 ===== */
    .pull-zone{
      position:absolute;
      bottom:10px;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:10px;
    }

    .string{
      width:3px;
      height:60px;
      background:#cfcfcf;
      border-radius:4px;
      transform-origin: top center;
    }

    .tag{
      width:120px;
      border:none;
      border-radius:14px;
      background:#ffd56b;
      font-weight:900;
      letter-spacing:1px;
      padding:12px 0;
      cursor:grab;
    }

    .tag:active{ cursor:grabbing; }

    /* 끈 끊김 */
    .string.break{
      animation: stringSnap .25s ease forwards;
    }

    @keyframes stringSnap{
      0%{ transform:scaleY(1); opacity:1; }
      100%{ transform:scaleY(0); opacity:0; }
    }

    /* 쿠키 흔들림 */
    @keyframes cookieShake{
      0%{ transform: rotate(0deg); }
      20%{ transform: rotate(-2deg); }
      40%{ transform: rotate(2deg); }
      60%{ transform: rotate(-1deg); }
      80%{ transform: rotate(1deg); }
      100%{ transform: rotate(0deg); }
    }
    .cookie-shake{
      animation: cookieShake .35s ease;
    }

    .hint{
      margin-top:12px;
      font-size:12px;
      opacity:.75;
    }
    /* ===== RARE(희귀) 모드 ===== */
.rare-glow .fortune-paper{
  border-color: rgba(255,213,107,.85);
  box-shadow: 0 0 0 1px rgba(255,213,107,.25), 0 18px 55px rgba(255,213,107,.18);
  background: radial-gradient(1200px 1200px at 20% 0%, rgba(255,213,107,.08), transparent 60%), #141414;
}

.rare-glow .cookie-half{
  background: linear-gradient(180deg, #ffe39c, #c8902f);
}

.rare-badge{
  display:inline-block;
  padding:6px 10px;
  border-radius:12px;
  font-weight:900;
  letter-spacing:.5px;
  color:#111;
  background:#ffd56b;
  margin-right:8px;
}
  </style>
</head>
<body>
  <div class="wrap">
    <h1>🥠 포춘쿠키</h1>
    <div class="small">※ 가볍게 참고용이에요. 대신 가끔은… 은근히 맞습니다.</div>

    <div class="card">
      <h2 style="margin:0 0 10px;">👤 기본 정보</h2>
      <div id="basicInfo"></div>
      <div id="loginHint" class="small" style="display:none;margin-top:8px;">
        로그인하면 포인트 적립이 됩니다. (비로그인도 쿠키는 볼 수 있어요)
      </div>
    </div>

    <div class="card">
      <div class="cookie-stage">
        <div class="cookie-wrap" id="cookieWrap">

          <!-- 쿠키 본체 (좌/우 분리) -->
          <div class="cookie-shell" id="cookieShell">
            <div class="cookie-half left" id="cookieLeft"></div>
            <div class="cookie-half right" id="cookieRight"></div>
            <div class="cookie-shine"></div>
          </div>

          <!-- 종이(운세) -->
          <div class="fortune-paper" id="fortunePaper">
            <div class="fortune-title" id="fortuneTitle">🥠 오늘의 포춘쿠키</div>
            <div class="fortune-msg" id="fortuneMsg"></div>
          </div>

          <!-- 끈 + 태그 -->
          <div class="pull-zone" id="pullZone">
            <div class="string" id="string"></div>
            <button class="tag" id="pullTag" type="button">PULL</button>
          </div>

        </div>

        <div class="hint" id="hintText">👇 아래 꼬리표를 잡아당겨 보세요</div>
      </div>

      <div class="hr"></div>

      <div class="row">
        <button id="btnShare">공유하고 포인트 받기</button>
        <button id="btnAgain" class="secondary">다시 뽑기</button>
      </div>

      <div id="againHint" class="small" style="margin-top:10px; display:none;">
        오늘은 이미 뽑았어요 🙂 내일 다시 뽑을 수 있어요!
      </div>
    </div>

    <div class="card">
      <button onclick="location.href='/pages/period/period.html'">오늘/내일/연간 운세</button>
      <button onclick="location.href='/pages/star/index.html'">별자리 운세</button>
      <button onclick="location.href='/point.html'">포인트</button>
      <button onclick="location.href='/'">홈으로</button>
    </div>

    <footer>
    <div>무료 운세 플랫폼</div>
    <div style="margin-top:8px;">
<a href="/privacy.html">개인정보처리방침</a> |
<a href="/terms.html">이용약관</a> |
<a href="/about.html">사이트 소개</a> |
<a href="/contact.html">문의</a>
    </div>
  </footer>

  <script src="/js/config.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/points.js"></script>
  <script src="/js/db.js"></script>
  <script src="/js/cookie.js"></script>
</body>
</html>
