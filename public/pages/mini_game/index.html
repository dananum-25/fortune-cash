<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>미니게임 | 무료 콘텐츠</title>
  <meta name="description" content="타이머 맞추기, 기억력 향상 게임 등 짧게 즐길 수 있는 미니게임 모음입니다.">
  <style>
    body{margin:0;background:#111;color:#fff;font-family:Arial,sans-serif;}
    .wrap{max-width:820px;margin:auto;padding:20px;}
    .card{background:#1a1a1a;border-radius:16px;padding:18px;margin:16px 0;}
    h1,h2{color:#ffd56b;}
    p{line-height:1.7;}
    a{color:#ffd56b;text-decoration:none;}
    .game-link{
      display:block;
      background:#222;
      border-radius:12px;
      padding:14px;
      margin-top:12px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>🎮 미니게임</h1>

    <div class="card">
      <h2>미니게임 안내</h2>
      <p>
        짧은 시간 동안 가볍게 즐길 수 있는 게임 모음입니다.
        집중력, 기억력, 감각을 활용하는 콘텐츠를 부담 없이 즐겨보세요.
      </p>
    </div>

    <div class="card">
      <h2>게임 목록</h2>

      <a class="game-link" href="https://game-time-kappa.vercel.app/" target="_blank" rel="noopener noreferrer">
        ⏱ 타이머 맞추기
      </a>
      <p class="small">감각적으로 시간을 예측해 보는 집중형 게임입니다.</p>

      <a class="game-link" href="https://fun-game-hub-gilt.vercel.app/" target="_blank" rel="noopener noreferrer">
        🧠 기억력 향상 치매 예방 게임
      </a>
      <p class="small">기억력과 주의력을 활용해 가볍게 즐길 수 있는 두뇌 게임입니다.</p>
    </div>

    <div class="card">
      <p><a href="/">홈으로</a></p>
    </div>
  </div>
</body>
</html>
