<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>무료 MBTI 성향 보기 | 유형별 특징과 간단 테스트</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="MBTI 유형별 특징을 확인하고 간단한 문항 테스트를 통해 성향을 참고할 수 있는 무료 콘텐츠입니다." />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div class="container">
    <div class="hero">🧠 MBTI</div>
    <div class="subinfo" id="pointBox"></div>

    <div class="resultBox" style="display:block;">
      <h3>MBTI 안내</h3>
      <p>
        MBTI는 성격 유형을 가볍게 이해하기 위한 참고형 콘텐츠입니다.
        자신의 성향, 대인관계 스타일, 의사소통 방식을 살펴보는 데 활용할 수 있습니다.
      </p>
      <p>
        결과는 절대적인 기준이 아니라 참고 자료이며,
        재미와 자기이해를 위한 용도로 보는 것이 적절합니다.
      </p>
    </div>

    <h3>MBTI 직접 선택</h3>
    <select id="mbtiSelect"></select>

    <button class="secondaryBtn" id="mbtiTestBtn">16문항 테스트 열기</button>
    <div id="mbtiQuestions" style="display:none;"></div>

    <button class="mainBtn" id="btn">MBTI 특징 보기</button>

    <div class="resultBox" id="resultBox" style="display:none;"></div>

    <button class="secondaryBtn" id="shareBtn">공유하기</button>
    <button class="secondaryBtn" onclick="Common.goHome()">홈으로</button>

    <div style="margin-top:24px;text-align:center;font-size:12px;opacity:.75;line-height:1.7;">
      <div>무료 운세 플랫폼</div>
      <div>
        <a href="/privacy.html">개인정보처리방침</a> |
        <a href="/terms.html">이용약관</a>
      </div>
    </div>
  </div>

  <script src="/js/common.js"></script>
  <script src="/js/db.js"></script>
  <script src="/js/mbti.js"></script>
</body>
</html>
